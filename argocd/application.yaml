apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miage-bank
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/eylul-alptekin/miage-bank-partieB.git
    targetRevision: main
    path: PartieB/miage-bank
  destination:
    server: https://kubernetes.default.svc
    namespace: miage-bank
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
