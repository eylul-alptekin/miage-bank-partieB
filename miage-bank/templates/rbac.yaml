apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "miage-bank.fullname" . }}-role
  namespace: miage-bank
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "miage-bank.fullname" . }}-rolebinding
  namespace: miage-bank
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "miage-bank.serviceAccountName" . }}
    namespace: miage-bank
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "miage-bank.fullname" . }}-role
