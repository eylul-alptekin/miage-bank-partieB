apiVersion: v1
kind: Service
metadata:
  name: {{ include "miage-bank.fullname" . }}-mysql
  namespace: miage-bank
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "miage-bank.fullname" . }}-mysql
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
      name: mysql
