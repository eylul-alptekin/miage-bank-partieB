apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: miage-bank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "miage-bank.fullname" . }}-allow-ingress
  namespace: miage-bank
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "miage-bank.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "miage-bank.fullname" . }}-mysql-policy
  namespace: miage-bank
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "miage-bank.fullname" . }}-mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "miage-bank.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3306
