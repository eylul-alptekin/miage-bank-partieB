replicaCount: 1

image:
  repository: ghcr.io/eylul-alptekin/miage-bank-front
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4200

ingress:
  enabled: true
  className: nginx
  hostname: miage-bank-front.local

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"