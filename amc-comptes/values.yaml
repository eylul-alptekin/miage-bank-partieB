replicaCount: 1

image:
  repository: ghcr.io/eylul-alptekin/miage-bank-comptes
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 10021

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

mongodb:
  image: mongo:6.0
  database: banquebd
  username: root
  port: 27017

# Secret créé automatiquement par ESO depuis Vault
secretName: amc-comptes-secrets

externalSecret:
  clusterSecretStore: vault-backend
  vaultPath: secret/miage-bank
  refreshInterval: 1h

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

probes:
  readiness:
    path: /actuator/health
    initialDelaySeconds: 60
    periodSeconds: 10
  liveness:
    path: /actuator/health
    initialDelaySeconds: 90
    periodSeconds: 15